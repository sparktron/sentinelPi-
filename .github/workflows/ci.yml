name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Run the JS-based actions (checkout, setup-python) on Node 24 instead of the
# deprecated Node 20 runtime, clearing the deprecation annotation.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Compile source and tests
        run: python -m compileall -q src tests

      - name: Lint
        run: ruff check src tests

      - name: Type check
        run: mypy

      - name: Run test suite
        run: pytest tests/ -q --cov=sentinelpi --cov-report=term-missing --cov-report=xml

  package:
    name: Packaging smoke test
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Install the built wheel into a clean venv and smoke-test it
        # Catches packaging regressions the src-layout test run can't: missing
        # packages in the wheel, a broken console entry point, or missing
        # runtime deps. Installs the artifact fresh, then exercises it.
        run: |
          python -m venv /tmp/smoke
          /tmp/smoke/bin/pip install dist/*.whl
          /tmp/smoke/bin/sentinelpi --version
          /tmp/smoke/bin/python -c "import sentinelpi; print('import OK', sentinelpi.__version__)"
          # Confirm packaged data files (dashboard templates) shipped in the wheel.
          /tmp/smoke/bin/python -c "import importlib.resources as r; \
            [r.files('sentinelpi.ui').joinpath('templates', t).read_text() \
             for t in ('dashboard.html', 'device.html', 'login.html')]; \
            print('templates OK')"
